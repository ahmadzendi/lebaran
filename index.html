    <script>
        const starContainer = document.getElementById('star-container');
        const particleCountConfig = window.innerWidth < 768 ? 70 : 150; 

        for (let i = 0; i < particleCountConfig; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            let size = Math.random() * 2.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
            star.style.animationDelay = Math.random() * 2 + 's';
            starContainer.appendChild(star);
        }

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 0.5; 
                this.speedX = (Math.random() * 0.6) - 0.3;
                this.speedY = (Math.random() * 1.2) + 0.4; 
            }
            update() {
                this.x += this.speedX;
                this.y -= this.speedY; 
                
                if (this.size > 0.1) this.size -= 0.003; 
                
                if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.size <= 0.1) {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 10;
                    this.size = Math.random() * 3 + 0.5;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.7)'; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let particleCount = window.innerWidth < 768 ? 30 : 70; 
            for (let i = 0; i < particleCount; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
