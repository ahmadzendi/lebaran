<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Hari Raya Idul Fitri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&family=Amiri:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-light: #ffea75;
            --gold-dark: #b8860b;
            --emerald-dark: #01170b;
            --emerald-light: #04381d;
            --glass-bg: rgba(4, 56, 29, 0.5);
            --glass-border: rgba(255, 215, 0, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: var(--emerald-dark);
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                radial-gradient(circle at center, rgba(1, 23, 11, 0.6) 0%, rgba(1, 10, 5, 0.95) 100%),
                url('https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply;
            filter: contrast(1.2) brightness(1.1);
        }
        .light-beam {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 100vw;
            height: 50vh;
            background: radial-gradient(ellipse at bottom, rgba(0, 255, 128, 0.15) 0%, transparent 70%);
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle infinite alternate ease-in-out;
            box-shadow: 0 0 5px #ffffff;
        }
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .ornament-container {
            position: absolute;
            top: -20px;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            animation: swing 4s ease-in-out infinite alternate;
        }
        .ornament-chain {
            width: 2px;
            background: linear-gradient(to bottom, #b38728, #fbf5b7, #b38728);
            box-shadow: 0 0 8px var(--gold);
        }
        .ornament-star {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFD700, #b8860b);
            position: relative;
            transform: rotate(22.5deg);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-top: -5px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #fff;
        }
        .ornament-star::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700, #b8860b);
            transform: rotate(45deg);
            border: 2px solid #fff;
            z-index: -1;
        }
        .ornament-star::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #01170b;
            border-radius: 50%;
            z-index: 1;
            box-shadow: inset 0 0 5px #000;
        }
        .ornament-crescent {
            width: 50px;
            height: 50px;
            fill: url(#goldGradient);
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.8));
            margin-top: 15px;
            transform: rotate(-15deg);
        }
        .o1 { left: 15%; animation-delay: 0.2s; }
        .o1 .ornament-chain { height: 150px; }
        .o2 { right: 15%; animation-delay: 1.5s; }
        .o2 .ornament-chain { height: 200px; }
        .ketupat-wrapper {
            position: absolute;
            top: -20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            animation: swing 3.5s ease-in-out infinite alternate;
        }
        .ketupat-rope {
            width: 3px;
            background: #a3b18a;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .ketupat-body {
            width: 70px;
            height: 70px;
            background-color: #1b5e20;
            background-image: 
                linear-gradient(45deg, #81c784 25%, transparent 25%, transparent 75%, #81c784 75%, #81c784),
                linear-gradient(-45deg, #81c784 25%, transparent 25%, transparent 75%, #81c784 75%, #81c784);
            background-size: 35px 35px;
            transform: rotate(45deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9);
            border: 2px solid #0a2e10;
            position: relative;
        }
        .ketupat-body::after, .ketupat-body::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 40px;
            background: #81c784;
            bottom: -35px;
            border-radius: 0 0 15px 15px;
            z-index: -1;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5);
        }
        .ketupat-body::after { left: 8px; transform: rotate(-25deg); }
        .ketupat-body::before { right: 8px; transform: rotate(25deg); }
        .k1 { left: 28%; animation-delay: 0.5s; }
        .k1 .ketupat-rope { height: 220px; }
        .k2 { right: 26%; animation-delay: 2.1s; }
        .k2 .ketupat-rope { height: 130px; }
        .k2 .ketupat-body { transform: rotate(45deg) scale(0.8); }
        .k3 { left: 8%; animation-delay: 1.2s; }
        .k3 .ketupat-rope { height: 320px; }
        .k3 .ketupat-body { transform: rotate(45deg) scale(1.3); }
        .k4 { right: 6%; animation-delay: 0.9s; top: 10%; }
        .k4 .ketupat-rope { height: 180px; }
        .k4 .ketupat-body { transform: rotate(45deg) scale(1.1); }
        
        /* Enhanced Glass Card */
        .glass-card {
            background: linear-gradient(145deg, rgba(4, 56, 29, 0.6), rgba(1, 23, 11, 0.7));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 3px solid transparent;
            border-image: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--gold)) 1;
            border-radius: 30px;
            padding: 60px 90px;
            text-align: center;
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.8),
                0 0 60px rgba(255,215,0,0.15),
                inset 0 0 60px rgba(255,215,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(30px);
            opacity: 0;
            animation: cardEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            max-width: 90%;
            position: relative;
            overflow: visible;
        }
        
        /* Elegant Border Frame */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 22px;
            pointer-events: none;
        }
        
        /* Shimmer Effect */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 60%;
            height: 200%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.1),
                transparent
            );
            transform: rotate(25deg);
            animation: shimmer 4s ease-in-out infinite;
            pointer-events: none;
        }
        
        /* Corner Ornaments */
        .corner-ornament {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.8;
        }
        .corner-ornament svg {
            width: 100%;
            height: 100%;
            fill: var(--gold);
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }
        .corner-tl { top: -5px; left: -5px; }
        .corner-tr { top: -5px; right: -5px; transform: rotate(90deg); }
        .corner-bl { bottom: -5px; left: -5px; transform: rotate(-90deg); }
        .corner-br { bottom: -5px; right: -5px; transform: rotate(180deg); }
        
        /* Arabic Bismillah */
        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        .subtitle {
            font-size: 1.3rem;
            letter-spacing: 6px;
            color: var(--gold-light);
            margin-bottom: -5px;
            text-shadow: 0 0 15px rgba(255, 234, 117, 0.6);
            text-transform: uppercase;
            font-weight: 300;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            background: linear-gradient(135deg, #FFD700, #fff8dc, #FFD700, #b8860b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShift 4s ease-in-out infinite;
            text-shadow: none;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
            line-height: 1.1;
            margin-bottom: 5px;
        }
        
        .date {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        /* Elegant Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
        }
        .divider-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .divider-diamond {
            width: 10px;
            height: 10px;
            background: var(--gold);
            transform: rotate(45deg);
            box-shadow: 0 0 15px rgba(255,215,0,0.6);
        }
        
        .message {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 2;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        
        /* Mohon Maaf Section */
        .maaf-section {
            margin: 30px 0;
            padding: 25px 0;
            position: relative;
        }
        .maaf-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .maaf-ornament-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .maaf-ornament-line:last-child {
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .maaf-ornament-star {
            font-size: 1.2rem;
            color: var(--gold);
            animation: pulse 2s ease-in-out infinite;
        }
        .maaf-text {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--gold), #fff8dc, var(--gold));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShift 3s ease-in-out infinite;
            text-shadow: none;
            filter: drop-shadow(0 5px 15px rgba(255,215,0,0.3));
            margin-bottom: 10px;
        }
        .maaf-subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
            letter-spacing: 3px;
            font-weight: 300;
        }
        
        .cta-link {
            text-decoration: none;
            display: inline-block;
        }
        .cta-button {
            background: linear-gradient(135deg, #FFD700, #d4af37, #b8860b);
            color: #1a1001;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 16px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 
                0 10px 30px rgba(255, 215, 0, 0.4),
                0 0 0 2px rgba(255,255,255,0.2),
                inset 0 2px 5px rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }
        .cta-button:hover::before {
            left: 100%;
        }
        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 20px 50px rgba(255, 215, 0, 0.6),
                0 0 0 3px rgba(255,255,255,0.3),
                inset 0 2px 5px rgba(255,255,255,0.8);
            color: #000;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px #ffffff; }
        }
        @keyframes swing {
            0% { transform: rotate(4deg); }
            100% { transform: rotate(-4deg); }
        }
        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%, 100% { left: -100%; }
            50% { left: 150%; }
        }
        @keyframes goldShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes glow {
            0% { text-shadow: 0 0 20px rgba(255,215,0,0.3); }
            100% { text-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .subtitle { font-size: 0.9rem; letter-spacing: 3px; }
            .glass-card { padding: 40px 25px; width: 92%; }
            .message { font-size: 0.9rem; line-height: 1.8; }
            .cta-button { padding: 14px 35px; font-size: 0.9rem; }
            .k3, .o1 { display: none; }
            .k1 .ketupat-rope { height: 120px; }
            .o2 .ornament-chain { height: 100px; }
            .bismillah { font-size: 1.5rem; }
            .maaf-text { font-size: 2.2rem; }
            .corner-ornament { width: 40px; height: 40px; }
            .divider-line { width: 50px; }
        }
    </style>
</head>
<body>

    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" />
            <stop offset="50%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#b8860b" />
        </linearGradient>
        <!-- Corner Ornament Pattern -->
        <symbol id="cornerOrnament" viewBox="0 0 100 100">
            <path d="M0,0 L40,0 C30,0 20,10 20,20 L20,20 C20,10 10,0 0,0 Z" />
            <path d="M0,0 L0,40 C0,30 10,20 20,20 L20,20 C10,20 0,10 0,0 Z" />
            <circle cx="25" cy="25" r="5" />
            <path d="M15,35 Q25,25 35,35 Q25,45 15,35 Z" opacity="0.7" />
            <path d="M35,15 Q25,25 35,35 Q45,25 35,15 Z" opacity="0.7" />
        </symbol>
    </svg>

    <div class="background"></div>
    <div class="light-beam"></div>
    <div class="stars" id="stars"></div>
    <canvas id="particles"></canvas>

    <div class="ornament-container o1">
        <div class="ornament-chain"></div>
        <div class="ornament-star"></div>
    </div>
    
    <div class="ornament-container o2">
        <div class="ornament-chain"></div>
        <svg class="ornament-crescent" viewBox="0 0 512 512">
            <path d="M416.3 381.1c-91.1 0-165-73.9-165-165 0-38.3 13.1-73.5 35-101.4-78.1 19-136.3 89.2-136.3 172.9 0 98.6 79.9 178.5 178.5 178.5 83.7 0 153.9-58.3 172.9-136.3-27.9 21.9-63.1 35-101.4 35z"/>
        </svg>
    </div>

    <div class="ketupat-wrapper k1">
        <div class="ketupat-rope"></div>
        <div class="ketupat-body"></div>
    </div>
    <div class="ketupat-wrapper k2">
        <div class="ketupat-rope"></div>
        <div class="ketupat-body"></div>
    </div>
    <div class="ketupat-wrapper k3">
        <div class="ketupat-rope"></div>
        <div class="ketupat-body"></div>
    </div>
    <div class="ketupat-wrapper k4">
        <div class="ketupat-rope"></div>
        <div class="ketupat-body"></div>
    </div>

    <div class="scene">
        <div class="glass-card">
            <!-- Corner Ornaments -->
            <div class="corner-ornament corner-tl">
                <svg><use href="#cornerOrnament"/></svg>
            </div>
            <div class="corner-ornament corner-tr">
                <svg><use href="#cornerOrnament"/></svg>
            </div>
            <div class="corner-ornament corner-bl">
                <svg><use href="#cornerOrnament"/></svg>
            </div>
            <div class="corner-ornament corner-br">
                <svg><use href="#cornerOrnament"/></svg>
            </div>
            
            <p class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
            <p class="subtitle">Selamat Hari Raya</p>
            <h1>IDUL FITRI</h1>
            <p class="date">1 Syawal 1446 H</p>
            
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line"></div>
            </div>
            
            <p class="message">Mari kembali fitrah dengan menyucikan hati,<br>mempererat silaturahmi, dan membuka<br>lembaran baru yang lebih baik.</p>
            
            <!-- Mohon Maaf Section -->
            <div class="maaf-section">
                <div class="maaf-ornament">
                    <div class="maaf-ornament-line"></div>
                    <span class="maaf-ornament-star">✦</span>
                    <div class="maaf-ornament-line"></div>
                </div>
                <p class="maaf-text">Mohon Maaf Lahir & Batin</p>
                <p class="maaf-subtitle">Taqabbalallahu Minna Wa Minkum</p>
            </div>
            
            <a href="https://lebarantiba.my.id/" class="cta-link" target="_blank">
                <button class="cta-button">KLIK DISINI</button>
            </a>
        </div>
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = window.innerWidth < 768 ? 60 : 150;
        
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 2.5 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.8 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y -= this.speedY;
                if (this.size > 0.1) this.size -= 0.005;
                if (this.y < 0 || this.x < 0 || this.x > canvas.width || this.size <= 0.1) {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 10;
                    this.size = Math.random() * 3 + 1;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let pCount = window.innerWidth < 768 ? 40 : 80;
            for (let i = 0; i < pCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
